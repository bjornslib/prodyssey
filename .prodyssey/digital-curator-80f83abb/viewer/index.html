<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codebase Odyssey — Option F: Merged Review</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/motion@12/dist/motion.min.js"></script>
<style>
  /* Option F merges Option D's flat-map content pipeline (day palette, JetBrains Mono,
     teal accent) with Option E's tactical-review structural ideas (topbar queue nav,
     rail teaser look, decision dock). See index.html comments below for where each
     piece was ported from and how conflicts were resolved. */
  :root{
    --accent:#2f8f9d;
    --accent-text: oklch(0.42 0.1 200);
    --ink: oklch(0.24 0.02 250);
    --ink-dim: oklch(0.5 0.02 250);
    --ink-dimmer: oklch(0.48 0.02 250);
    --line: rgba(30,40,55,0.12);
    --line-soft: rgba(30,40,55,0.1);
    --paper: #f6f4ef;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--paper);}
  body{
    font-family:-apple-system,'Segoe UI',sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .mono{ font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace; }
  a{color:oklch(0.5 0.13 200);}
  a:hover{color:oklch(0.4 0.14 200);}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(30,40,55,0.18);border-radius:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  button{font-family:inherit;}

  #app{height:100vh;width:100%;display:flex;flex-direction:column;background:var(--paper);overflow:hidden;}

  /* ================= TOPBAR (Option E's 3-zone layout, translated to day palette) =================
     Grid, not flex: a 1fr/auto/1fr track truly centers the middle (PR nav) cluster in the row
     regardless of how wide the brand block or the hints widget happen to be — flexbox's naive
     `flex:1 1 auto; justify-content:center` on the middle item only centers it within whatever
     space is left after the side items, which visually drifts off-center whenever those two
     side blocks differ in width (as they do here: brand block vs. shortcut-hints widget). */
  #topbar{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px;padding:12px 24px;
    border-bottom:1px solid var(--line);background:#fff;
  }
  .tb-brand{flex:0 0 auto;justify-self:start;min-width:0;}
  .tb-brand .brand-title{font:700 12.5px 'JetBrains Mono',monospace;letter-spacing:.14em;color:oklch(0.22 0.02 250);}
  .tb-brand .brand-repo{font:10.5px 'JetBrains Mono',monospace;color:var(--ink-dim);letter-spacing:.02em;margin-top:2px;}

  .tb-center{justify-self:center;min-width:0;display:flex;align-items:center;gap:12px;}
  .tb-nav-btn{
    width:26px;height:26px;border-radius:5px;border:1px solid var(--line);background:#fff;color:var(--ink);
    font-size:14px;line-height:1;cursor:pointer;flex:0 0 auto;
  }
  .tb-nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent-text);}
  .tb-nav-btn:disabled{opacity:.3;cursor:not-allowed;}
  .tb-pr-label{font:12.5px 'JetBrains Mono',monospace;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46vw;}
  .tb-pr-label b{color:var(--accent-text);}
  .tb-queue-count{font:11px 'JetBrains Mono',monospace;color:var(--ink-dim);white-space:nowrap;}

  .tb-right{flex:0 0 auto;justify-self:end;display:flex;align-items:center;gap:18px;}
  #tb-hints{display:flex;align-items:center;gap:8px;}
  .kbd-hints{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font:11px 'JetBrains Mono',monospace;color:var(--ink-dim);}
  kbd{background:rgba(30,40,55,.06);border:1px solid rgba(30,40,55,.16);border-radius:3px;padding:1px 6px;margin-right:3px;}
  .hints-collapse-btn{
    flex:0 0 auto;width:20px;height:20px;border-radius:50%;border:1px solid var(--line);background:#fff;
    color:var(--ink-dim);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .hints-collapse-btn:hover{border-color:var(--accent);color:var(--accent-text);}
  .hints-chip{
    font:10.5px 'JetBrains Mono',monospace;letter-spacing:.03em;color:var(--ink-dim);background:oklch(0.98 0.005 250);
    border:1px solid var(--line);border-radius:12px;padding:4px 10px;cursor:pointer;white-space:nowrap;
  }
  .hints-chip:hover{border-color:var(--accent);color:var(--accent-text);}

  /* Slim queue-dot strip under the topbar (spec: "compact... small dots... or under the
     topbar"). Ported from D's #queue-strip but stripped of PR-number sub-labels. */
  #queue-dots-row{
    flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:8px 24px;border-bottom:1px solid var(--line-soft);
    background:#fff;
  }
  #queue-dots-row .qd-label{font:9.5px 'JetBrains Mono',monospace;color:var(--ink-dim);letter-spacing:.1em;text-transform:uppercase;flex:0 0 auto;}
  #queue-dots-track{position:relative;flex:1;height:14px;}
  #queue-dots-track .qd-line{position:absolute;left:1%;right:1%;top:50%;height:1px;background:rgba(30,40,55,0.12);transform:translateY(-50%);}
  /* .qd-dot is the hit-target/position anchor only — CSS transform:translate(-50%,-50%)
     centers it on the track line. The scale pulse (renderQueueDots) animates the
     .qd-dot-fill CHILD instead of the dot itself: Motion's animate() writes a raw
     inline `transform` for whatever it animates, which would otherwise blow away this
     translate(-50%,-50%) (Motion has no idea a CSS transform already lives here) and
     leave the active dot permanently offset down-right by half its own size once the
     pulse settles. Isolating the animated transform on a child with no positioning
     transform of its own sidesteps that clash entirely. */
  .qd-dot{position:absolute;top:50%;border-radius:50%;cursor:pointer;padding:0;background:none;border:none;transform:translate(-50%,-50%);}
  .qd-dot-fill{display:block;width:100%;height:100%;border-radius:50%;}

  /* ================= CONTENT ROW: left rail + content column ================= */
  #content-row{flex:1 1 auto;min-height:0;display:flex;overflow:hidden;}

  /* Left rail: D's leveling (vertical, numbered) with E's rail look (teaser lines,
     active highlight), translated to day palette. */
  #level-rail{
    flex:0 0 224px;display:flex;flex-direction:column;gap:0;
    background:#fff;border-right:1px solid var(--line);overflow-y:auto;
  }
  .rail-nav-title{font:10px 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin:14px 14px 2px;}
  .rail-item{
    padding:12px 14px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid var(--line-soft);
    transition:background-color 150ms ease,border-color 150ms ease,color 150ms ease;
  }
  .rail-item:hover{background:oklch(0.97 0.005 250);}
  .rail-item.active{background:color-mix(in oklch, var(--accent) 7%, white);border-left-color:var(--accent);}
  .rail-num{font:600 10px 'JetBrains Mono',monospace;color:var(--ink-dim);letter-spacing:.06em;}
  .rail-item.active .rail-num{color:var(--accent-text);}
  .rail-title{font:600 12.5px system-ui,sans-serif;color:oklch(0.25 0.02 250);margin-top:2px;}
  .rail-item.active .rail-title{color:var(--accent-text);}
  .rail-teaser{font-size:11px;color:var(--ink-dim);line-height:1.4;margin-top:4px;}

  #content-col{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;min-height:0;}

  /* Slim narration caption, sits atop the scrollable content (spec allows either side).
     Heading + narration on the left, fixed-width audio control on the right — vertically
     centered against the heading block. */
  #narration-caption{
    flex:0 0 auto;padding:12px 26px;border-bottom:1px solid var(--line-soft);background:#fff;
    display:flex;align-items:center;justify-content:space-between;gap:20px;
  }
  .caption-text{min-width:0;flex:1 1 auto;}
  .caption-text .pr-title-line{font:700 13px system-ui,sans-serif;color:oklch(0.22 0.02 250);margin-bottom:3px;}
  .caption-text .narration-text{margin:0;font-size:13px;line-height:1.5;font-style:italic;color:var(--ink-dim);max-width:80ch;}

  /* Narration-audio control (ported from D's .audio-card). Lives in the content-pane
     header now, not the topbar. A fixed flex-basis means the row never reflows whether
     the label reads "narration audio — Overview" or "narration audio (none for this
     level)" — present-but-dimmed either way, never removed from layout. */
  #tb-audio{
    /* flex-item quirk: without an explicit min-width, a flex child's default
       min-width:auto lets its content's min-content size (here, the long "none for
       this level" label) win over flex-basis/flex-grow:0 and stretch the box wider —
       min-width:0 here plus min-width:0+ellipsis on .audio-label is what actually
       makes the fixed 280px hold regardless of label length. */
    flex:0 0 280px;min-width:0;width:280px;display:flex;align-items:center;gap:9px;
    background:oklch(0.98 0.005 250);border:1px solid var(--line);
    border-radius:20px;padding:5px 12px 5px 5px;overflow:hidden;
  }
  #tb-audio.disabled{opacity:.45;}
  #tb-audio .audio-btn{
    flex:0 0 auto;width:22px;height:22px;border-radius:50%;border:1px solid rgba(30,40,55,0.2);
    background:color-mix(in oklch, var(--accent) 10%, white);color:var(--accent-text);font-size:9px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  #tb-audio .audio-btn:disabled{cursor:not-allowed;}
  #tb-audio .audio-progress{flex:0 0 64px;height:3px;background:rgba(30,40,55,0.12);border-radius:2px;overflow:hidden;}
  #tb-audio .audio-fill{height:100%;width:0%;background:var(--accent);}
  #tb-audio .audio-label{
    flex:1 1 auto;min-width:0;font:10px 'JetBrains Mono',monospace;color:var(--ink-dim);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  /* ---------- Main scrollable content + scroll-through cue ---------- */
  #main-content-wrap{flex:1 1 auto;min-height:0;position:relative;}
  /* Generous bottom whitespace (spec fix #1): reaching the scroll-through cue must take real
     scrolling, even on levels whose authored content barely exceeds (or doesn't exceed) the
     viewport — a short level should not land the pointer "at the bottom" with zero motion. */
  #main-content{height:100%;overflow-y:auto;padding:22px 26px 28px;padding-block-end:40vh;}
  .level-stack{display:flex;flex-direction:column;gap:16px;}
  .level-stack.narrow{max-width:1040px;margin:0 auto;}
  .level-stack.narrower{max-width:960px;margin:0 auto;}

  .scroll-cue{
    position:absolute;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:8px;
    font:600 11px 'JetBrains Mono',monospace;letter-spacing:.04em;color:var(--accent-text);
    background:linear-gradient(to bottom, transparent, color-mix(in oklch, var(--accent) 12%, white) 40%, color-mix(in oklch, var(--accent) 18%, white));
    padding:10px 0 8px;pointer-events:none;
  }
  .scroll-cue.bottom{bottom:0;}
  .scroll-cue.top{top:0;background:linear-gradient(to top, transparent, color-mix(in oklch, var(--accent) 12%, white) 40%, color-mix(in oklch, var(--accent) 18%, white));}
  .scroll-cue[hidden]{display:none;}

  .hero-frame{border-radius:10px;overflow:hidden;border:1px solid var(--line);box-shadow:0 2px 10px rgba(30,40,55,0.06);}
  .hero-frame img{display:block;width:100%;height:auto;}

  .district-boxes{display:flex;flex-wrap:wrap;gap:10px;}
  .district-box{
    min-height:96px;padding:10px 12px;border-radius:8px;display:flex;flex-direction:column;
    justify-content:flex-end;align-items:flex-start;text-align:left;cursor:pointer;font-family:inherit;
    transition:background .4s ease,border-color .4s ease;border-width:1px;border-style:solid;
  }
  .district-box .db-label{font:600 12px system-ui,sans-serif;color:oklch(0.22 0.02 250);}
  .district-box .db-files{font:10.5px 'JetBrains Mono',monospace;color:var(--ink-dim);margin-top:2px;}
  .district-box.static{cursor:default;min-height:78px;}
  .district-box .db-touch{font:10.5px 'JetBrains Mono',monospace;color:var(--ink-dim);margin-top:2px;}

  .legend-row{display:flex;gap:16px;flex-wrap:wrap;font:10.5px 'JetBrains Mono',monospace;color:var(--ink-dim);}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .legend-swatch{width:8px;height:8px;border-radius:2px;display:inline-block;}

  .chip-row{display:flex;gap:12px;flex-wrap:wrap;}
  .touch-chip{font:10.5px 'JetBrains Mono',monospace;padding:5px 10px;border-radius:12px;border:1px solid;}

  /* ---------- Fixed-size evidence/problem/solution cards (spec: ~240px, internal
     scroll). Ported from E's evidence/problem/solution card visuals, day palette. ---------- */
  .grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .fixed-card{
    height:240px;border-radius:10px;border:1px solid var(--line);background:#fff;
    padding:14px 16px;display:flex;flex-direction:column;min-height:0;
  }
  .fixed-card .fc-kicker{
    flex:0 0 auto;font:700 10.5px 'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;
    margin-bottom:8px;display:flex;align-items:center;gap:6px;
  }
  .fixed-card .fc-body{flex:1 1 auto;min-height:0;overflow-y:auto;}
  .fixed-card .fc-body p{margin:0 0 8px 0;font-size:13px;line-height:1.55;color:oklch(0.28 0.02 250);}
  .fixed-card .fc-body p:last-child{margin-bottom:0;}
  .fixed-card .fc-empty{font-size:12px;color:var(--ink-dim);font-style:italic;}

  .fixed-card.evidence .fc-kicker{color:var(--accent-text);}
  .fixed-card.problem{border-left:3px solid oklch(0.6 0.16 25);}
  .fixed-card.problem .fc-kicker{color:oklch(0.5 0.15 25);}
  .fixed-card.solution{border-left:3px solid oklch(0.55 0.15 145);}
  .fixed-card.solution .fc-kicker{color:oklch(0.42 0.13 145);}

  .alt-section-label{font:10.5px 'JetBrains Mono',monospace;letter-spacing:.1em;color:var(--ink-dim);text-transform:uppercase;margin-bottom:8px;}
  .alt-row{display:flex;gap:12px;flex-wrap:wrap;}
  .alt-card{width:240px;background:#fff;border:1px dashed oklch(0.6 0.13 25);border-radius:8px;padding:10px 12px;}
  .alt-card .alt-opt{font-size:12px;font-weight:600;color:oklch(0.3 0.02 250);}
  .alt-card .alt-rej{font-size:11px;color:oklch(0.45 0.14 25);margin-top:5px;line-height:1.4;}

  .adr-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .adr-badge{
    font:10.5px 'JetBrains Mono',monospace;padding:4px 10px;border-radius:3px;cursor:pointer;
    border:1px solid oklch(0.55 0.12 60);color:oklch(0.45 0.12 60);background:oklch(0.97 0.02 60);
  }
  .adr-badge:hover{background:oklch(0.94 0.04 60);border-color:oklch(0.48 0.13 60);}
  .no-adrs{font:11.5px system-ui,sans-serif;color:var(--ink-dim);}

  .beats-stack{display:flex;flex-direction:column;gap:10px;}
  .beat-card.fixed-card{height:180px;}
  .beat-card .fc-kicker{color:oklch(0.5 0.02 250);}
  .beat-card.intuition{background:color-mix(in oklch, var(--accent) 6%, white);border-color:color-mix(in oklch, var(--accent) 30%, transparent);}
  .beat-card.intuition .fc-kicker{color:var(--accent-text);}

  .focus-banner{display:flex;align-items:center;gap:10px;font:12px system-ui,sans-serif;color:var(--accent-text);background:color-mix(in oklch, var(--accent) 8%, white);border:1px solid color-mix(in oklch, var(--accent) 35%, transparent);border-radius:8px;padding:8px 14px;}
  .focus-banner button{margin-left:auto;border:none;background:none;color:var(--accent-text);text-decoration:underline;cursor:pointer;font:12px system-ui,sans-serif;}

  .file-group{border:1px solid rgba(30,40,55,0.14);border-left:3px solid oklch(0.5 0.14 200);border-radius:6px;background:#fff;overflow:hidden;}
  .file-group.match{border-color:oklch(0.5 0.14 200);background:color-mix(in oklch, oklch(0.5 0.14 200) 5%, white);}
  .file-group summary{padding:12px 16px;cursor:pointer;font:600 13px system-ui,sans-serif;color:oklch(0.25 0.02 250);}
  .file-group .fg-note{padding:0 16px 12px;font-size:12px;color:oklch(0.48 0.02 250);line-height:1.5;}
  .file-group .fg-files{margin:0;padding:0 16px 14px 16px;}
  .file-row{display:flex;align-items:center;gap:10px;padding:4px 0;font:11px 'JetBrains Mono',monospace;color:oklch(0.4 0.1 155);}
  .file-row .fr-name{flex:1 1 auto;min-width:0;overflow-wrap:anywhere;}
  .fr-diffbtn{
    flex:0 0 auto;font:10px 'JetBrains Mono',monospace;padding:3px 9px;border-radius:10px;cursor:pointer;
    border:1px solid color-mix(in oklch, var(--accent) 50%, transparent);background:color-mix(in oklch, var(--accent) 8%, white);color:var(--accent-text);
  }
  .fr-nodiff{flex:0 0 auto;font:10.5px 'JetBrains Mono',monospace;color:var(--ink-dim);font-style:italic;}
  .fr-diffbody{margin:4px 0 10px;border:1px solid var(--line);border-radius:6px;overflow:hidden;max-height:320px;overflow-y:auto;background:oklch(0.985 0.003 250);}
  .fr-diffbody[hidden]{display:none;}
  .diff-line{font:11.5px 'JetBrains Mono',monospace;white-space:pre;padding:1px 12px;}
  .diff-add{background:oklch(0.94 0.05 145);color:oklch(0.38 0.12 145);}
  .diff-del{background:oklch(0.95 0.06 25);color:oklch(0.45 0.15 25);}
  .diff-hunk{color:var(--accent-text);opacity:.9;}
  .diff-meta{color:var(--ink-dim);}
  .diff-ctx{color:oklch(0.32 0.02 250);}

  .empty-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 20px;text-align:center;}
  .empty-card .empty-detail{font-size:12.5px;color:oklch(0.45 0.02 250);}

  /* ================= DECISION DOCK (E's structure, day palette) =================
     Single row now: review-status pill on the left, [Comments (n)] [Close] [Merge ▾] on the
     right. The comment compose UI and comment list live in the drawer (below) instead. */
  #dock{flex:0 0 auto;border-top:1px solid var(--line);background:#fff;}
  .dock-row1{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 24px;flex-wrap:wrap;}
  .dock-row1-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .dock-tag-label{font:11px 'JetBrains Mono',monospace;color:var(--ink-dim);}
  .tag-chip{
    font:10px 'JetBrains Mono',monospace;padding:3px 9px;border-radius:10px;white-space:nowrap;
    border:1px solid color-mix(in oklch, var(--accent) 50%, transparent);color:var(--accent-text);
    background:color-mix(in oklch, var(--accent) 6%, white);
  }
  #comment-input{
    width:100%;background:#fff;border:1px solid var(--line);color:var(--ink);
    padding:9px 12px;border-radius:8px;font-size:12.5px;font-family:inherit;
  }
  #comment-input:focus{outline:2px solid color-mix(in oklch, var(--accent) 50%, transparent);border-color:var(--accent);}

  .split-btn{display:flex;position:relative;flex:0 0 auto;}
  .split-main{
    font:600 12px system-ui,sans-serif;padding:9px 14px;border:1px solid oklch(0.5 0.15 145);
    border-right:1px solid oklch(0.4 0.15 145);border-radius:6px 0 0 6px;
    background:oklch(0.5 0.15 145);color:#fff;cursor:pointer;white-space:nowrap;
  }
  .split-main:hover{background:oklch(0.45 0.15 145);}
  .split-main.is-merged{background:#8250df;border-color:#6b3fc0;}
  .split-main.is-merged:hover{background:#7440c9;}
  .split-arrow{
    font:11px system-ui,sans-serif;padding:9px 10px;border:1px solid oklch(0.5 0.15 145);border-left:none;
    border-radius:0 6px 6px 0;background:oklch(0.5 0.15 145);color:#fff;cursor:pointer;
  }
  .split-arrow:hover{background:oklch(0.45 0.15 145);}
  .split-arrow.is-merged{background:#8250df;border-color:#6b3fc0;}
  .merge-menu{
    position:absolute;bottom:calc(100% + 6px);left:0;min-width:200px;background:#fff;
    border:1px solid var(--line);border-radius:8px;box-shadow:0 -6px 20px rgba(30,40,55,0.16);
    padding:6px;z-index:20;
  }
  .merge-menu[hidden]{display:none;}
  .merge-menu-item{
    display:block;width:100%;text-align:left;font:12px system-ui,sans-serif;padding:8px 10px;
    border:none;background:none;border-radius:6px;cursor:pointer;color:var(--ink);
  }
  .merge-menu-item:hover{background:oklch(0.96 0.01 250);}

  .decision-btn{
    font:600 11.5px system-ui,sans-serif;padding:9px 16px;border-radius:6px;border:1px solid;
    cursor:pointer;background:#fff;white-space:nowrap;flex:0 0 auto;
  }
  .decision-btn.close-pr{border-color:oklch(0.55 0.18 25);color:oklch(0.45 0.16 25);}
  .decision-btn.close-pr.active,.decision-btn.close-pr:hover{background:oklch(0.95 0.06 25);}
  .btn-add-comment{
    font:600 11px system-ui,sans-serif;padding:9px 14px;border-radius:6px;flex:0 0 auto;
    border:1px solid rgba(30,40,55,0.2);background:oklch(0.98 0.005 250);color:var(--ink);cursor:pointer;
  }
  .btn-add-comment:hover{border-color:var(--accent);color:var(--accent-text);}

  .comment-list{display:flex;flex-direction:column;gap:5px;min-width:0;}
  .comment-empty{font-size:11.5px;color:var(--ink-dim);font-style:italic;padding:6px 0;}
  .comment-row{
    display:flex;align-items:flex-start;gap:8px;font-size:12.5px;line-height:1.5;color:oklch(0.3 0.02 250);
    background:oklch(0.98 0.005 250);border:1px solid var(--line);border-radius:6px;padding:6px 10px;
  }
  .comment-row .level-chip{
    flex:0 0 auto;font:9.5px 'JetBrains Mono',monospace;letter-spacing:.04em;text-transform:uppercase;
    padding:2px 7px;border-radius:10px;border:1px solid color-mix(in oklch, var(--accent) 50%, transparent);
    color:var(--accent-text);background:color-mix(in oklch, var(--accent) 6%, white);
  }
  .comment-row .comment-text{flex:1;}
  .comment-row .comment-del{flex:0 0 auto;border:none;background:none;color:oklch(0.55 0.13 25);cursor:pointer;font-size:12px;padding:0 2px;}

  .decision-status{font:11px 'JetBrains Mono',monospace;padding:4px 10px;border-radius:12px;border:1px solid;white-space:nowrap;}
  .btn-copy-md{
    font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:.04em;padding:5px 11px;border-radius:5px;
    border:1px solid rgba(30,40,55,0.2);background:#fff;color:var(--ink-dimmer);cursor:pointer;white-space:nowrap;
  }
  .btn-copy-md.flash{background:oklch(0.94 0.05 150);border-color:oklch(0.55 0.14 150);color:oklch(0.4 0.13 150);}
  .link-btn{background:none;border:none;color:var(--ink-dim);font:11px 'JetBrains Mono',monospace;text-decoration:underline;cursor:pointer;padding:0;white-space:nowrap;}
  .link-btn:hover{color:oklch(0.45 0.16 25);}

  /* ================= COMMENTS DRAWER (shadcn Sheet look, recreated in vanilla CSS) ================= */
  #drawer-scrim{
    position:fixed;inset:0;background:rgba(20,25,35,0.4);opacity:0;pointer-events:none;
    transition:opacity .2s ease;z-index:40;
  }
  #drawer-scrim.open{opacity:1;pointer-events:auto;}
  #comments-drawer{
    position:fixed;top:0;right:0;bottom:0;width:420px;max-width:92vw;background:#fff;
    border-left:1px solid var(--line);border-radius:14px 0 0 14px;box-shadow:-12px 0 34px rgba(20,25,35,0.2);
    transform:translateX(100%);transition:transform .25s ease;z-index:41;
    display:flex;flex-direction:column;min-height:0;
  }
  #comments-drawer.open{transform:translateX(0);}
  .drawer-header{
    flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid var(--line-soft);
  }
  .drawer-header h2{margin:0;font:700 14px system-ui,sans-serif;color:oklch(0.22 0.02 250);}
  .drawer-close{
    flex:0 0 auto;width:26px;height:26px;border-radius:6px;border:none;background:none;
    font-size:16px;line-height:1;color:var(--ink-dim);cursor:pointer;
  }
  .drawer-close:hover{background:oklch(0.96 0.01 250);color:var(--ink);}
  .drawer-body{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;padding:16px 20px;gap:14px;overflow:hidden;}
  .drawer-compose{flex:0 0 auto;display:flex;flex-direction:column;gap:8px;}
  .drawer-compose-row{display:flex;align-items:center;gap:8px;}
  .drawer-list-label{font:10px 'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim);}
  .drawer-list{flex:1 1 auto;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
  .drawer-footer{
    flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:12px 20px;border-top:1px solid var(--line-soft);
  }

  /* ================= ADR SHEET (same shadcn-Sheet family as the comments drawer,
     just wider — reuses .drawer-header/.drawer-close/.drawer-body). Shares
     #drawer-scrim with the comments drawer; JS enforces only one open at a time. ================= */
  #adr-sheet{
    position:fixed;top:0;right:0;bottom:0;width:clamp(480px, 40vw, 720px);max-width:92vw;background:#fff;
    border-left:1px solid var(--line);border-radius:14px 0 0 14px;box-shadow:-12px 0 34px rgba(20,25,35,0.2);
    transform:translateX(100%);transition:transform .25s ease;z-index:41;
    display:flex;flex-direction:column;min-height:0;
  }
  #adr-sheet.open{transform:translateX(0);}
  #adr-sheet .drawer-header{align-items:flex-start;}
  .adr-sheet-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .adr-state-badge{font:10px 'JetBrains Mono',monospace;letter-spacing:.04em;padding:3px 9px;border-radius:10px;border:1px solid;text-transform:uppercase;white-space:nowrap;}
  .adr-sheet-sourceline{font:11px 'JetBrains Mono',monospace;color:var(--ink-dim);}
  #adr-sheet .drawer-body{overflow-y:auto;gap:16px;}

  .adr-block{border-radius:10px;border:1px solid var(--line);background:#fff;padding:14px 16px;}
  .adr-block.problem{border-left:3px solid oklch(0.6 0.16 25);}
  .adr-block.decision{border-left:3px solid oklch(0.55 0.15 145);}
  .adr-block .ab-kicker{font:700 10.5px 'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
  .adr-block.problem .ab-kicker{color:oklch(0.5 0.15 25);}
  .adr-block.decision .ab-kicker{color:oklch(0.42 0.13 145);}
  .adr-block p{margin:0;font-size:13px;line-height:1.6;color:oklch(0.28 0.02 250);}

  .force-chip{font:10.5px 'JetBrains Mono',monospace;padding:5px 10px;border-radius:12px;border:1px solid var(--line);color:var(--ink-dim);background:oklch(0.98 0.005 250);}

  .adr-delivers-dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:6px 12px;}
  .adr-delivers-dl dt{font:600 10px 'JetBrains Mono',monospace;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-dim);white-space:nowrap;}
  .adr-delivers-dl dd{margin:0;font-size:12.5px;line-height:1.5;color:oklch(0.3 0.02 250);}

  /* Minimal markdown renderer output — headings/paragraphs/lists/quotes/code/tables. */
  .adr-body-md{font-size:13px;line-height:1.65;color:oklch(0.28 0.02 250);}
  .adr-body-md h2,.adr-body-md h3,.adr-body-md h4,.adr-body-md h5,.adr-body-md h6{
    margin:18px 0 8px;font-family:system-ui,sans-serif;color:oklch(0.22 0.02 250);
  }
  .adr-body-md h2{font-size:15px;font-weight:700;}
  .adr-body-md h3{font-size:14px;font-weight:700;}
  .adr-body-md h4,.adr-body-md h5,.adr-body-md h6{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-dim);}
  .adr-body-md p{margin:0 0 10px;}
  .adr-body-md ul,.adr-body-md ol{margin:0 0 10px;padding-left:22px;}
  .adr-body-md li{margin-bottom:4px;}
  .adr-body-md blockquote{margin:0 0 10px;padding:6px 14px;border-left:3px solid color-mix(in oklch, var(--accent) 45%, transparent);background:color-mix(in oklch, var(--accent) 5%, white);color:var(--ink-dim);}
  .adr-body-md blockquote p{margin:0;}
  .adr-body-md code{font:12px 'JetBrains Mono',monospace;background:oklch(0.96 0.008 250);padding:1px 5px;border-radius:3px;}
  .adr-body-md pre.md-code{background:oklch(0.16 0.01 250);color:oklch(0.92 0.005 250);border-radius:8px;padding:12px 14px;overflow-x:auto;margin:0 0 10px;}
  .adr-body-md pre.md-code code{background:none;padding:0;color:inherit;}
  .adr-body-md pre.md-table{background:oklch(0.98 0.005 250);border:1px solid var(--line);border-radius:6px;padding:10px 12px;overflow-x:auto;margin:0 0 10px;font-size:11.5px;}
  .adr-body-md a{color:var(--accent-text);}

  /* ================= AUDIO DIALOG (shadcn Dialog look, centered) =================
     #audio-dialog-layer is a full-viewport flex centering box (pointer-events:none so
     it never blocks clicks when empty) — the dialog is centered by flexbox, not by a
     position:fixed + transform:translate(-50%,-50%) trick, precisely so Motion's scale
     pulse (anim() writing a raw inline `transform`) has nothing pre-existing to clobber,
     the same class of bug fixed on the queue dots above. */
  #audio-dialog-layer{position:fixed;inset:0;z-index:42;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  #audio-dialog{
    pointer-events:auto;width:min(1200px, 94vw);max-height:94vh;background:#fff;border:1px solid var(--line);border-radius:14px;
    box-shadow:0 20px 60px rgba(20,25,35,0.28);padding:20px 22px 18px;display:flex;flex-direction:column;gap:14px;
  }
  #audio-dialog[hidden]{display:none;}
  #drawer-scrim.audio-dim{background:rgba(20,25,35,0.5);backdrop-filter:blur(2px);}
  .audio-dialog-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .audio-dialog-title{font:700 14px system-ui,sans-serif;color:oklch(0.22 0.02 250);}
  /* Body is either the generated level image (preferred) or, when no image asset exists
     for this PR/level, a narration-text fallback — never both at once (see
     renderAudioDialogContent). */
  .audio-dialog-image{display:block;width:100%;max-height:78vh;object-fit:contain;border-radius:10px;border:1px solid var(--line);background:oklch(0.97 0.005 250);}
  .audio-dialog-image[hidden]{display:none;}
  .audio-dialog-narration{margin:0;font-size:13px;line-height:1.6;font-style:italic;color:var(--ink-dim);}
  .audio-dialog-narration[hidden]{display:none;}
  .audio-dialog-controls{display:flex;align-items:center;gap:10px;}
  .audio-dialog-controls .audio-btn{width:28px;height:28px;font-size:10px;}
  .audio-dialog-controls .audio-progress{flex:1 1 auto;height:4px;}
</style>
